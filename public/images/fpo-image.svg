<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">FPO image placeholder</title>
  <desc id="desc">A neutral creamy image placeholder with a subtle zig-zag texture.</desc>
  <defs>
    <linearGradient id="crop-bands" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#d9c8b7" stop-opacity="0.22"/>
      <stop offset="0.1667" stop-color="#d9c8b7" stop-opacity="0.14"/>
      <stop offset="0.3333" stop-color="#f4eadf" stop-opacity="0.22"/>
      <stop offset="0.4167" stop-color="#fff8ef" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#fffaf4" stop-opacity="0.34"/>
      <stop offset="0.5833" stop-color="#fff8ef" stop-opacity="0.28"/>
      <stop offset="0.6667" stop-color="#f4eadf" stop-opacity="0.22"/>
      <stop offset="0.8333" stop-color="#d9c8b7" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#d9c8b7" stop-opacity="0.22"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#efe5d8" stroke-width="2" opacity="0.38"/>
    </pattern>
    <pattern id="diagonal" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="32" fill="#ffffff" opacity="0.24"/>
    </pattern>
    <linearGradient id="tone" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6efe5"/>
      <stop offset="0.52" stop-color="#e8ddce"/>
      <stop offset="1" stop-color="#d9c8b7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#tone)"/>
  <rect width="1600" height="1200" fill="url(#crop-bands)"/>
  <rect x="533.333" width="533.334" height="1200" fill="#fff7ed" opacity="0.13"/>
  <rect x="711.111" width="177.778" height="1200" fill="#ffffff" opacity="0.12"/>
  <rect width="1600" height="1200" fill="url(#grid)"/>
  <rect width="1600" height="1200" fill="url(#diagonal)" opacity="0.55"/>
  <path d="M533.333 0V1200M1066.667 0V1200" stroke="#ffffff" stroke-width="4" opacity="0.2"/>
  <path d="M711.111 0V1200M888.889 0V1200" stroke="#8f7b68" stroke-width="3" opacity="0.08"/>
</svg>
